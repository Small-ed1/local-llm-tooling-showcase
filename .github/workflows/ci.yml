name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dev package
        run: python -m pip install -e '.[dev]'

      - name: Run doctor
        run: tooling-showcase doctor

      - name: Check whitespace
        run: git diff --check

      - name: Check shell scripts
        run: bash -n install.sh && bash -n start-servers.sh

      - name: Compile Python
        run: python -m compileall -q src tests

      - name: Check frontend JavaScript
        run: node --check src/tooling_showcase/static/app.js

      - name: Run tests
        run: pytest tests/

      - name: Run lint
        run: python -m ruff check src tests

      - name: Build wheel
        run: python -m build --wheel

      - name: Install built wheel
        run: |
          python -m venv /tmp/showcase-wheel-venv
          . /tmp/showcase-wheel-venv/bin/activate
          python -m pip install dist/*.whl
          tooling-showcase doctor
